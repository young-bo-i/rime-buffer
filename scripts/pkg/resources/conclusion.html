<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  :root { color-scheme: light dark; }
  body { font: -apple-system-body, "Helvetica Neue", sans-serif; color: CanvasText; margin: 12px 16px; line-height: 1.6; }
  h2 { margin: 0 0 8px; color: CanvasText; }
  p { color: CanvasText; }
  ol { margin: 6px 0 6px 20px; padding: 0; }
  li { margin: 4px 0; color: CanvasText; }
  b { color: CanvasText; }
  .tip { background: rgba(255,179,0,0.14); border-left: 3px solid #ffb300; padding: 8px 12px; border-radius: 4px; margin-top: 12px; }
</style></head>
<body>
  <h2>安装完成 🎉</h2>
  <p>「恩特输入法」已装好并注册。启用它：</p>
  <ol>
    <li>打开<b>系统设置 → 键盘 → 文本输入 → 输入法</b>，点<b>「编辑…」</b>或 <b>+</b></li>
    <li>左侧选<b>「简体中文」</b>，右侧勾选/添加<b>「恩特输入法」</b></li>
    <li>用输入菜单（菜单栏语言图标，或 <b>Ctrl-Space</b>）切换到它，开始打字</li>
  </ol>
  <div class="tip">
    <b>看不到「恩特输入法」？</b> 全新安装的输入法通常要<b>注销账户再重新登录一次</b>（或重启）才会出现在列表里——这是 macOS 的正常缓存行为，不是故障。重登后再回到第 1 步即可。
  </div>
</body></html>
