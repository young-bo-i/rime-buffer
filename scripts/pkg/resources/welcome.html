<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  :root { color-scheme: light dark; }
  body { font: -apple-system-body, "Helvetica Neue", sans-serif; color: CanvasText; margin: 12px 16px; line-height: 1.55; }
  h2 { margin: 0 0 6px; color: CanvasText; }
  p { color: CanvasText; }
  .muted { color: GrayText; }
  code { background: rgba(127,127,127,0.18); padding: 1px 5px; border-radius: 4px; }
</style></head>
<body>
  <h2>欢迎安装「Enter输入法」(ETInput)</h2>
  <p>从零做的现代 macOS 中文输入法：librime 引擎 + 自绘候选窗 + 常驻缓冲区，支持并击。</p>
  <p><b>自包含</b>——引擎与词库已打包在应用内，<b>无需单独安装 Squirrel（鼠须管）</b>，装一个就能用。</p>
  <p class="muted">安装器会把它放进 <code>/Library/Input Methods</code>，并自动注册、启用、尝试切换到「Enter输入法」。</p>
</body></html>
