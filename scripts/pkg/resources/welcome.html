<body>
  <h2>欢迎安装「恩特输入法」(ETInput)</h2>
  <p>从零做的现代 macOS 中文输入法：librime 引擎 + 自绘候选窗 + 常驻缓冲区，支持并击。</p>
  <p><b>自包含</b>——引擎与词库已打包在应用内，<b>无需单独安装 Squirrel（鼠须管）</b>，装一个就能用。</p>
  <p class="muted">安装器会把它放进 <code>/Library/Input Methods</code> 并自动注册；随后按提示到「系统设置」里启用即可。</p>
