# encoding: utf-8

__include: rime_ice.schema.yaml:/

schema:
  schema_id: ai_box
  name: AI Box
  version: "1.0"
  author:
    - Isaac
    - Codex
  description: |
    AI 缓冲输入模式
    Space 收词进缓冲，↑/↓ 切换能力，Tab 执行，Esc 取消并返回我的并击方案
  dependencies:
    - melt_eng

engine:
  processors:
    - lua_processor@*ai_box_processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*ai_box_status_translator
    - punct_translator
    - script_translator
    - table_translator@custom_phrase
    - table_translator@melt_eng
  filters:
    - lua_filter@*ai_box_filter
    - uniquifier

translator:
  prism: rime_ice

ai_box_processor:
  return_schema_id: my_combo
  timeout_seconds: 12
  python_bin: /usr/bin/python3
  error_prefix: "AI 请求失败："
  enable_stream: true
  poll_interval_seconds: 0.12
  wait_timeout_seconds: 20
  native_refresh_key: F20

ai_box_status_translator:
  idle_code: zzzzaibox
  label: "〔AI Box〕"
  preedit_prefix: "AI Box >"
  ready_hint: "1-4/↑↓ 空格回车Tab"
  waiting_text: "AI 正在生成..."
  comment_preview_chars: 96

ai_box_filter:
  label: "〔AI Box〕"
