# encoding: utf-8

__include: rime_ice.schema.yaml:/

schema:
  schema_id: my_serial
  name: 串击
  version: "1.0"
  author:
    - Isaac
    - Codex
  description: |
    串击输入方案
    Shift 切中英，Shift+Space 进退 AI

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, 英 ]
  - name: ai_mode
    reset: 0
    states: [ 常, AI ]

engine:
  processors:
    - lua_processor@*mode_switch_processor
    - lua_processor@*ai_box_processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*ai_box_status_translator
    - punct_translator
    - script_translator
    - table_translator@custom_phrase
    - table_translator@melt_eng
  filters:
    - lua_filter@*ai_box_filter
    - uniquifier

ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Caps_Lock: clear
    Shift_L: commit_code
    Shift_R: commit_code
    Control_L: noop
    Control_R: noop

translator:
  dictionary: rime_ice
  prism: my_serial

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default

ai_box_processor:
  timeout_seconds: 12
  python_bin: /usr/bin/python3
  error_prefix: "AI 请求失败："
  enable_stream: true
  poll_interval_seconds: 0.12
  wait_timeout_seconds: 20
  native_refresh_key: F20

ai_box_status_translator:
  idle_code: zzzzaibox
  label: "〔AI〕"
  preedit_prefix: "AI >"
  ready_hint: "1-4/↑↓ 空格回车Tab"
  waiting_text: "AI 正在生成..."
  comment_preview_chars: 96

ai_box_filter:
  label: "〔AI〕"

mode_switch_processor:
  idle_code: zzzzaibox
