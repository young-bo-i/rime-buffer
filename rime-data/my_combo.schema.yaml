  alphabet: 'qwertyuiopasdfghjklzxcvbnm,.'
  delimiter: "'"
translator:
  dictionary: rime_ice  # 使用雾凇拼音词典
  prism: my_combo
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

punctuator:
  import_preset: default

key_binder:
  import_preset: default
