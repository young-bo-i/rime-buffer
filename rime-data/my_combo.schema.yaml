    - 'xform/([.])([qwertasdfgzxcvbyuiophjklnm,])/\2\1/g'
    
    # ===== 完整音节映射优先（避免被基础规则覆盖） =====
    

  

    # 一、单键声母 + 单键韵母 / 组合韵母
    # q 声母 + 单键韵母
