# encoding: utf-8

schema:
  schema_id: my_combo
  name: 并击
  version: '1.0'
  author:
    - 你的名字
  description: |
    自定义并击输入方案
    基于 Rime 输入法引擎

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, 英 ]
  - name: ai_mode
    reset: 0
    states: [ 常, AI ]

engine:
  processors:
    - lua_processor@*mode_switch_processor
    - lua_processor@*ai_box_processor
    - lua_processor@*ai_clipboard_processor
    - ascii_composer
    - recognizer
    - chord_composer  # 核心：并击处理器
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*ai_box_status_translator
    - punct_translator
    - script_translator
    - lua_translator@*ai_translator
  filters:
    - lua_filter@*ai_box_filter
    - uniquifier

ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Caps_Lock: clear
    Shift_L: commit_code
    Shift_R: commit_code
    Control_L: noop
    Control_R: noop

# 根据prd.md映射表配置的chord_composer组件
chord_composer:
  # 定义用于并击的按键字母表
  alphabet: 'qwertyuiopasdfghjklzxcvbnm,.'
  
  # 并击转换规则 - 将并击序列转换为拼音
  algebra:
    # ===== 单个字母直接上屏（无隔音符号） =====
    - 'xform/^([qwertyuiopasdfghjklzxcvbnm,.])$/$1/'
    
    
    # ===== 按键顺序规范化（针对完整并击） =====
    # 第一步：将所有按键重新排序为标准顺序（左半区在前，右半区在后）
    # 这样无论用户按键顺序如何，都能正确匹配
    
    # 重排序规则：提取左半区和右半区的键，然后重新组合
    # 左半区：qwertasdfgzxcvb
    # 右半区：yuiophjklnm,.
    
    # 处理两键组合
    - 'xform/^([qwertasdfgzxcvb])([yuiophjklnm,.])$/$1$2/'
    - 'xform/^([yuiophjklnm,.])([qwertasdfgzxcvb])$/$2$1/'
    
    # 处理三键组合
    - 'xform/^([qwertasdfgzxcvb])([qwertasdfgzxcvb])([yuiophjklnm,.])$/$1$2$3/'
    - 'xform/^([qwertasdfgzxcvb])([yuiophjklnm,.])([qwertasdfgzxcvb])$/$1$3$2/'
    - 'xform/^([qwertasdfgzxcvb])([yuiophjklnm,.])([yuiophjklnm,.])$/$1$2$3/'
    - 'xform/^([yuiophjklnm,.])([qwertasdfgzxcvb])([qwertasdfgzxcvb])$/$2$3$1/'
    - 'xform/^([yuiophjklnm,.])([qwertasdfgzxcvb])([yuiophjklnm,.])$/$2$1$3/'
    - 'xform/^([yuiophjklnm,.])([yuiophjklnm,.])([qwertasdfgzxcvb])$/$3$1$2/'
    
    # ===== 通用按键重排序 =====
    # 核心思路：将任意按键组合按键盘顺序重排
    # 键盘顺序：qwertasdfgzxcvbyuiophjklnm,.
    
    # 使用递归替换实现冒泡排序算法
    # 每次将较后面的字符向前移动，直到所有字符按键盘顺序排列
    
    # 第1轮：处理相邻字符交换（冒泡排序的一轮）
    - 'xform/([w])([q])/\2\1/g'      # wq -> qw
    - 'xform/([e])([qw])/\2\1/g'     # eq/ew -> qe/we  
    - 'xform/([r])([qwe])/\2\1/g'    # rq/rw/re -> qr/wr/er
    - 'xform/([t])([qwer])/\2\1/g'   # 以此类推...
    - 'xform/([a])([qwert])/\2\1/g'
    - 'xform/([s])([qwerta])/\2\1/g'
    - 'xform/([d])([qwertas])/\2\1/g'
    - 'xform/([f])([qwertasd])/\2\1/g'
    - 'xform/([g])([qwertasdf])/\2\1/g'
    - 'xform/([z])([qwertasdfg])/\2\1/g'
    - 'xform/([x])([qwertasdfgz])/\2\1/g'
    - 'xform/([c])([qwertasdfgzx])/\2\1/g'
    - 'xform/([v])([qwertasdfgzxc])/\2\1/g'
    - 'xform/([b])([qwertasdfgzxcv])/\2\1/g'
    - 'xform/([y])([qwertasdfgzxcvb])/\2\1/g'
    - 'xform/([u])([qwertasdfgzxcvby])/\2\1/g'
    - 'xform/([i])([qwertasdfgzxcvbyu])/\2\1/g'
    - 'xform/([o])([qwertasdfgzxcvbyui])/\2\1/g'
    - 'xform/([p])([qwertasdfgzxcvbyuio])/\2\1/g'
    - 'xform/([h])([qwertasdfgzxcvbyuiop])/\2\1/g'
    - 'xform/([j])([qwertasdfgzxcvbyuioph])/\2\1/g'
    - 'xform/([k])([qwertasdfgzxcvbyuiophj])/\2\1/g'
    - 'xform/([l])([qwertasdfgzxcvbyuiophjk])/\2\1/g'
    - 'xform/([n])([qwertasdfgzxcvbyuiophjkl])/\2\1/g'
    - 'xform/([m])([qwertasdfgzxcvbyuiophjkln])/\2\1/g'
    - 'xform/([,])([qwertasdfgzxcvbyuiophjklnm])/\2\1/g'
    - 'xform/([.])([qwertasdfgzxcvbyuiophjklnm,])/\2\1/g'
    
    # 第2轮：重复一遍确保完全排序（处理长组合）
    - 'xform/([w])([q])/\2\1/g'
    - 'xform/([e])([qw])/\2\1/g'
    - 'xform/([r])([qwe])/\2\1/g'
    - 'xform/([t])([qwer])/\2\1/g'
    - 'xform/([a])([qwert])/\2\1/g'
    - 'xform/([s])([qwerta])/\2\1/g'
