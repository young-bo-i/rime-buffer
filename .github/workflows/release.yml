name: Build and Release

on:
  push:
    tags:
      - 'v*'            # push a v-prefixed tag (e.g. v0.2.0) to cut a release
  workflow_dispatch:    # manual builds (produces an artifact, no release)
    inputs:
      version:
        description: 'Version number (e.g. 0.2.0)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write       # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-14   # ARM64 runner; the app is built universal below
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Stamp version into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Info.plist
          echo "----- Info.plist versions -----"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Info.plist

      # Universal (arm64 + x86_64) so the same .app runs on Apple Silicon and
      # Intel. librime is dlopen'd at runtime, so nothing extra is needed here.
      - name: Build (release, universal)
        run: |
          swift build -c release --arch arm64 --arch x86_64
          echo "BIN_DIR=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)" >> "$GITHUB_ENV"

      # Download librime + Rime data (from Squirrel's official pkg) so the app is
      # self-contained — end users don't need to install Squirrel separately.
      - name: Fetch bundled librime runtime
        run: ./scripts/fetch-rime.sh

      - name: Assemble ETInput.app
        run: |
          APP="ETInput.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" \
                   "$APP/Contents/Frameworks" "$APP/Contents/SharedSupport"
          # SPM target is still "RimeBuffer"; ship the binary as ETInput.
          cp "$BIN_DIR/RimeBuffer" "$APP/Contents/MacOS/ETInput"
          cp Info.plist "$APP/Contents/Info.plist"
          cp -R Vendor/rime/Frameworks/* "$APP/Contents/Frameworks/"
          cp -R Vendor/rime/SharedSupport/* "$APP/Contents/SharedSupport/"
          [ -f Logo/AppIcon.icns ] && cp Logo/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns" || true
          # --deep: sign the nested librime + plugin dylibs too.
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose "$APP" || true
          xattr -cr "$APP"
          echo "----- assembled bundle -----"
          file "$APP/Contents/MacOS/ETInput"
          du -sh "$APP"

      - name: Package ZIP
        id: package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP="ETInput-${VERSION}.zip"
          # ditto preserves the bundle structure + ad-hoc signature; the in-app
          # updater unzips this with /usr/bin/unzip.
          ditto -c -k --sequesterRsrc --keepParent "ETInput.app" "$ZIP"
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "ZIP=$ZIP" >> "$GITHUB_OUTPUT"
          echo "SHA256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "ZIP: $ZIP  SHA256: $SHA256"

      # Guided .pkg installer — installs to /Library/Input Methods and registers
      # the input source (the drag-from-Downloads path hits App Translocation).
      - name: Build installer (.pkg)
        id: pkg
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ./scripts/make-pkg.sh "$VERSION" "ETInput.app" "ETInput-${VERSION}.pkg"
          PKG="ETInput-${VERSION}.pkg"
          PKG_SHA256=$(shasum -a 256 "$PKG" | awk '{print $1}')
          echo "PKG=$PKG" >> "$GITHUB_OUTPUT"
          echo "PKG_SHA256=$PKG_SHA256" >> "$GITHUB_OUTPUT"
          echo "PKG: $PKG  SHA256: $PKG_SHA256"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.PKG }}
            ${{ steps.package.outputs.ZIP }}
          body: |
            ## 恩特输入法 (ETInput) v${{ steps.version.outputs.VERSION }}

            现代 macOS 中文输入法（IMK + librime）。**自包含**：librime 引擎与 Rime
            词库已打包在 app 内，**无需单独安装 Squirrel**，装一个就能用。通用二进制
            （Apple Silicon + Intel）。

            ### 安装（推荐：向导式安装器）
            下载 **`ETInput-${{ steps.version.outputs.VERSION }}.pkg`** → 双击 → 按向导安装
            （输入管理员密码，装到 `/Library/Input Methods` 并自动注册）。
            未经 Apple 公证，若首次被拦：在 pkg 上**右键 → 打开**。
            装完到「**系统设置 → 键盘 → 输入法**」添加「恩特输入法」；
            **全新输入法通常需注销重登一次才会出现在列表**（macOS 正常行为）。

            ### 应用内自动更新
            已安装并运行的恩特输入法会自动检查最新 Release，静默下载后在状态栏提示；
            点「立即更新」即自动替换并重启。（更新走下方 `.zip`，无需手动。）

            ### 校验和
            | 文件 | SHA256 |
            |------|--------|
            | PKG | `${{ steps.pkg.outputs.PKG_SHA256 }}` |
            | ZIP | `${{ steps.package.outputs.SHA256 }}` |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (manual builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ETInput-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ steps.pkg.outputs.PKG }}
            ${{ steps.package.outputs.ZIP }}
