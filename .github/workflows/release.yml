name: Build and Release

on:
  push:
    tags:
      - 'v*'            # push a v-prefixed tag (e.g. v0.2.0) to cut a release
  workflow_dispatch:    # manual builds (produces an artifact, no release)
    inputs:
      version:
        description: 'Version number (e.g. 0.2.0)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write       # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-14   # ARM64 runner; the app is built universal below
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate input-source metadata
        run: |
          plutil -lint Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' Info.plist)
          PARENT_ID=$(/usr/libexec/PlistBuddy -c 'Print :TISInputSourceID' Info.plist)
          MODE_ID=$(/usr/libexec/PlistBuddy -c 'Print :ComponentInputModeDict:tsVisibleInputModeOrderedArrayKey:0' Info.plist)
          DECLARED_MODE_ID=$(/usr/libexec/PlistBuddy -c "Print :ComponentInputModeDict:tsInputModeListKey:${MODE_ID}:TISInputSourceID" Info.plist)
          CONNECTION=$(/usr/libexec/PlistBuddy -c 'Print :InputMethodConnectionName' Info.plist)
          CHILD_REPERTOIRE=$(/usr/libexec/PlistBuddy -c "Print :ComponentInputModeDict:tsInputModeListKey:${MODE_ID}:tsInputModeCharacterRepertoireKey" Info.plist | tr -d '[:space:]')
          test "$PARENT_ID" = "$BUNDLE_ID"
          test "$PARENT_ID" != "$MODE_ID"
          test "$MODE_ID" = "$DECLARED_MODE_ID"
          test "$CONNECTION" = 'RimeBuffer_1_Connection'
          test "$CHILD_REPERTOIRE" = 'Array{HansHant}'
          # Freeze the input-source identity to exact literals. The structure
          # checks above still pass if the whole trio is renamed together, but
          # macOS burns these ids into the protected TIS preferences: any drift
          # orphans the old rows and stacks duplicate "Enter输入法" entries in
          # System Settings (this bit us across the 0.3–0.4 renames — see
          # RELEASE.md). Never change these without a migration story.
          test "$BUNDLE_ID" = 'com.isaac.inputmethod.RimeBuffer'
          test "$MODE_ID" = 'com.isaac.inputmethod.RimeBuffer.Hans'
          test "$MODE_ID" = "${BUNDLE_ID}.Hans"
          if /usr/libexec/PlistBuddy -c 'Print :tsInputMethodCharacterRepertoireKey' Info.plist >/dev/null 2>&1; then
            echo 'Parent input method must not declare a repertoire; only the Hans child mode does.'
            exit 1
          fi
          bash -n build_install.sh
          bash -n scripts/pkg/scripts/postinstall

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Stamp version into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Info.plist
          echo "----- Info.plist versions -----"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Info.plist

      # Universal (arm64 + x86_64) so the same .app runs on Apple Silicon and
      # Intel. librime is dlopen'd at runtime, so nothing extra is needed here.
      - name: Build (release, universal)
        run: |
          swift build -c release --arch arm64 --arch x86_64
          echo "BIN_DIR=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)" >> "$GITHUB_ENV"

      # Download librime + Rime data (from Squirrel's official pkg) so the app is
      # self-contained — end users don't need to install Squirrel separately.
      - name: Fetch bundled librime runtime
        run: ./scripts/fetch-rime.sh

      - name: Assemble the app bundle
        run: |
          APP="ETInput.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" \
                   "$APP/Contents/Frameworks" "$APP/Contents/SharedSupport"
          # SPM target is still "RimeBuffer"; ship the binary as ETInput.
          cp "$BIN_DIR/RimeBuffer" "$APP/Contents/MacOS/ETInput"
          cp Info.plist "$APP/Contents/Info.plist"
          cp -R Vendor/rime/Frameworks/* "$APP/Contents/Frameworks/"
          cp -R Vendor/rime/SharedSupport/* "$APP/Contents/SharedSupport/"
          find "$APP/Contents/SharedSupport" -maxdepth 1 -type f -name '*.schema.yaml' -delete
          # Overlay the four product schemas plus their hidden dictionaries and
          # reverse-lookup dependencies so a fresh install is self-contained.
          cp -R rime-data/* "$APP/Contents/SharedSupport/"
          [ -f Logo/AppIcon.icns ] && cp Logo/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns" || true
          cp -R Resources/*.lproj "$APP/Contents/Resources/" 2>/dev/null || true   # localized display name
          cp Resources/etinput.pdf "$APP/Contents/Resources/" 2>/dev/null || true  # colored brand icon (Settings row)
          cp Resources/etinput-menu.pdf "$APP/Contents/Resources/" 2>/dev/null || true  # monochrome input-menu glyph
          cp Resources/menubar-template.png "$APP/Contents/Resources/" 2>/dev/null || true  # status-bar glyph
          # --deep: sign the nested librime + plugin dylibs too.
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose "$APP" || true
          xattr -cr "$APP"
          echo "----- assembled bundle -----"
          file "$APP/Contents/MacOS/ETInput"
          du -sh "$APP"

      - name: Package ZIP
        id: package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP="ETInput-${VERSION}.zip"
          # ditto preserves the bundle structure + ad-hoc signature; the in-app
          # updater unzips this with /usr/bin/unzip.
          ditto -c -k --sequesterRsrc --keepParent "ETInput.app" "$ZIP"
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "ZIP=$ZIP" >> "$GITHUB_OUTPUT"
          echo "SHA256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "ZIP: $ZIP  SHA256: $SHA256"

      # Guided .pkg installer — installs to /Library/Input Methods and registers
      # the input source (the drag-from-Downloads path hits App Translocation).
      - name: Build installer (.pkg)
        id: pkg
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ./scripts/make-pkg.sh "$VERSION" "ETInput.app" "ETInput-${VERSION}.pkg"
          PKG="ETInput-${VERSION}.pkg"
          PKG_SHA256=$(shasum -a 256 "$PKG" | awk '{print $1}')
          echo "PKG=$PKG" >> "$GITHUB_OUTPUT"
          echo "PKG_SHA256=$PKG_SHA256" >> "$GITHUB_OUTPUT"
          echo "PKG: $PKG  SHA256: $PKG_SHA256"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.PKG }}
            ${{ steps.package.outputs.ZIP }}
          body: |
            ## Enter输入法 (ETInput) v${{ steps.version.outputs.VERSION }}

            现代 macOS 中文输入法（IMK + librime）。**自包含**：librime 引擎与 Rime
            词库已打包在 app 内，**无需单独安装 Squirrel**，装一个就能用。通用二进制
            （Apple Silicon + Intel）。

            ### 安装（推荐：向导式安装器）
            下载 **`ETInput-${{ steps.version.outputs.VERSION }}.pkg`** → 双击 → 按向导安装
            （输入管理员密码，装到 `/Library/Input Methods`，并自动注册、启用、尝试切换）。
            未经 Apple 公证，若首次被拦：在 pkg 上**右键 → 打开**。
            多数情况下安装完成后可直接用输入菜单或 `Ctrl-Space` 切换到「Enter输入法」；
            若菜单未刷新，先运行 `killall TextInputMenuAgent SystemUIServer`，仍看不到再注销重登一次。

            ### 应用内自动更新
            已安装并运行的 Enter输入法会自动检查最新 Release，静默下载后在状态栏提示；
            点「立即更新」即自动替换并重启。（更新走下方 `.zip`，无需手动。）

            ### 校验和
            | 文件 | SHA256 |
            |------|--------|
            | PKG | `${{ steps.pkg.outputs.PKG_SHA256 }}` |
            | ZIP | `${{ steps.package.outputs.SHA256 }}` |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (manual builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ETInput-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ steps.pkg.outputs.PKG }}
            ${{ steps.package.outputs.ZIP }}
