name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      # Catch malformed input-source/package metadata before the release-only
      # workflow tries to assemble an installer.
      - name: Validate installer metadata
        run: |
          plutil -lint Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' Info.plist)
          PARENT_ID=$(/usr/libexec/PlistBuddy -c 'Print :TISInputSourceID' Info.plist)
          MODE_ID=$(/usr/libexec/PlistBuddy -c 'Print :ComponentInputModeDict:tsVisibleInputModeOrderedArrayKey:0' Info.plist)
          DECLARED_MODE_ID=$(/usr/libexec/PlistBuddy -c "Print :ComponentInputModeDict:tsInputModeListKey:${MODE_ID}:TISInputSourceID" Info.plist)
          CONNECTION=$(/usr/libexec/PlistBuddy -c 'Print :InputMethodConnectionName' Info.plist)
          DISPLAY_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' Info.plist)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' Info.plist)
          MENU_TITLE=$(/usr/libexec/PlistBuddy -c "Print :ComponentInputModeDict:tsInputModeListKey:${MODE_ID}:tsInputModeAlternateMenuTitleKey" Info.plist)
          CHILD_REPERTOIRE=$(/usr/libexec/PlistBuddy -c "Print :ComponentInputModeDict:tsInputModeListKey:${MODE_ID}:tsInputModeCharacterRepertoireKey" Info.plist | tr -d '[:space:]')
          test "$PARENT_ID" = "$BUNDLE_ID"
          test "$PARENT_ID" != "$MODE_ID"
          test "$MODE_ID" = "$DECLARED_MODE_ID"
          test "$CONNECTION" = 'RimeBuffer_1_Connection'
          test "$DISPLAY_NAME" = 'RIMES'
          test "$MENU_TITLE" = 'RIMES'
          test "$EXECUTABLE" = 'ETInput'
          test "$CHILD_REPERTOIRE" = 'Array{HansHant}'
          # Freeze the input-source identity to exact literals. The structure
          # checks above still pass if the whole trio is renamed together, but
          # macOS burns these ids into the protected TIS preferences: any drift
          # orphans the old rows and stacks duplicate "RIMES" entries in
          # System Settings (this bit us across the 0.3–0.4 renames — see
          # RELEASE.md). Never change these without a migration story.
          test "$BUNDLE_ID" = 'com.isaac.inputmethod.RimeBuffer'
          test "$MODE_ID" = 'com.isaac.inputmethod.RimeBuffer.Hans'
          test "$MODE_ID" = "${BUNDLE_ID}.Hans"
          if /usr/libexec/PlistBuddy -c 'Print :tsInputMethodCharacterRepertoireKey' Info.plist >/dev/null 2>&1; then
            echo 'Parent input method must not declare a repertoire; only the Hans child mode does.'
            exit 1
          fi
          xmllint --noout scripts/pkg/distribution.xml
          for STRINGS in Resources/*.lproj/InfoPlist.strings; do
            plutil -lint "$STRINGS"
            for KEY in CFBundleDisplayName CFBundleName "$BUNDLE_ID" "$MODE_ID"; do
              test "$(/usr/libexec/PlistBuddy -c "Print :$KEY" "$STRINGS")" = 'RIMES'
            done
          done
          bash -n Logo/generate.sh
          bash -n build_install.sh
          bash -n scripts/lib/rime-user-state.sh
          bash -n scripts/test-rime-user-state.sh
          bash -n scripts/make-pkg.sh
          bash -n scripts/pkg/scripts/postinstall

      - name: Preserve durable user state across reseed
        run: scripts/test-rime-user-state.sh

      # Privacy: the log must never carry user-entered/committed text. The
      # scanner follows multiline/raw strings and nested interpolation, while
      # allowing only explicitly redacted values and known-safe metadata.
      - name: No plaintext in logs
        run: python3 scripts/lint-log-privacy.py

      # librime is dlopen'd at runtime (see CRimeBridge.cpp), so the build has no
      # link-time dependency on Squirrel — a stock runner compiles it cleanly.
      - name: Build (debug)
        run: swift build

      # These smoke harnesses exercise local models/config stores only and
      # exit before the IMK/librime bootstrap, so they run without Squirrel.
      - name: Smoke tests
        run: |
          BIN="$(swift build --show-bin-path)/RimeBuffer"
          ROOT="$RUNNER_TEMP/rimebuffer-smoke"
          mkdir -p "$ROOT/profile" "$ROOT/local" "$ROOT/plugins"
          export RIMEBUFFER_USER_DIR="$ROOT/profile"
          export RIMEBUFFER_LOCAL_DATA_ROOT="$ROOT/local"
          export RIMEBUFFER_PLUGIN_ROOT="$ROOT/plugins"

          SMOKES=(
            schema-smoke
            buffer-smoke
            buffer-window-smoke
            stats-smoke
            matrix-smoke
            candidate-metrics-smoke
            theme-smoke
            origin-smoke
            inbound-smoke
            plugin-smoke
            plugin-stream-smoke
            plugin-platform-smoke
            translation-smoke
            ai-text-smoke
            stream-input-smoke
            settings-routing-smoke
            history-heatmap-smoke
            typing-speed-smoke
            fly-chord-learning-smoke
            input-telemetry-smoke
            user-lexicon-smoke
            remote-smoke
          )
          for smoke in "${SMOKES[@]}"; do
            echo "::group::$smoke"
            if "$BIN" "$smoke"; then
              echo "::endgroup::"
            else
              status=$?
              echo "::endgroup::"
              echo "::error title=Smoke test failed::$smoke exited with status $status"
              exit "$status"
            fi
          done

      # Instantiate every core/dynamic AppKit route, render it off-screen, and
      # verify the complete manifest. All writable roots are runner-temporary,
      # so this cannot read a developer's live stats, plugins, token, or userdb.
      - name: Settings assembly render smoke
        run: |
          BIN="$(swift build --show-bin-path)/RimeBuffer"
          ROOT="$RUNNER_TEMP/rimebuffer-settings-render"
          OUTPUT="$ROOT/output"
          mkdir -p "$OUTPUT" "$ROOT/profile" "$ROOT/local" "$ROOT/plugins"
          RIMEBUFFER_USER_DIR="$ROOT/profile" \
          RIMEBUFFER_LOCAL_DATA_ROOT="$ROOT/local" \
          RIMEBUFFER_PLUGIN_ROOT="$ROOT/plugins" \
            "$BIN" settings-render "$OUTPUT"
          test "$(find "$OUTPUT" -maxdepth 1 -type f -name '*.png' | wc -l | tr -d ' ')" = '22'
          python3 -m json.tool "$OUTPUT/manifest.json" >/dev/null
          ! rg -q 'extension\.apple-translation' "$OUTPUT/manifest.json"
